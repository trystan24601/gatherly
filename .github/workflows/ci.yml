name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform init (no backend)
        run: terraform init -backend=false
        working-directory: infra/terraform

      - name: Terraform validate
        run: terraform validate
        working-directory: infra/terraform

      - name: Terraform format check
        run: terraform fmt -check -recursive
        working-directory: infra/terraform

  lint-and-typecheck:
    name: Lint & Typecheck (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=${{ matrix.workspace }}

      - name: Typecheck
        run: npm run typecheck --workspace=${{ matrix.workspace }}

  unit-tests:
    name: Unit Tests (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --workspace=${{ matrix.workspace }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Build backend
        run: npm run build --workspace=backend

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start local services
        run: docker compose up -d dynamodb-local dynamodb-admin mailhog

      - name: Wait for DynamoDB Local
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000 > /dev/null 2>&1; then
              echo "DynamoDB Local ready"
              break
            fi
            echo "Attempt $i/30 — waiting for DynamoDB Local..."
            sleep 2
          done

      - name: Bootstrap and seed database
        run: |
          npm run db:bootstrap --workspace=backend
          npm run db:seed --workspace=backend
        env:
          AWS_REGION: eu-west-2
          DYNAMODB_ENDPOINT: http://localhost:8000
          DYNAMODB_TABLE_NAME: gatherly-local
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local

      - name: Start API
        run: npm run dev --workspace=backend &
        env:
          AWS_REGION: eu-west-2
          DYNAMODB_ENDPOINT: http://localhost:8000
          DYNAMODB_TABLE_NAME: gatherly-local
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
          PORT: 3001

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3001/health > /dev/null 2>&1; then
              echo "API ready"
              break
            fi
            echo "Attempt $i/30 — waiting for API..."
            sleep 2
          done

      - name: Start frontend
        run: npm run dev --workspace=frontend &
        env:
          VITE_API_BASE_URL: http://localhost:3001

      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend ready"
              break
            fi
            echo "Attempt $i/30 — waiting for frontend..."
            sleep 2
          done

      - name: Run Playwright tests
        run: npm test --workspace=e2e
        env:
          E2E_BASE_URL: http://localhost:5173
          E2E_API_URL: http://localhost:3001

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Upload Playwright videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-videos
          path: e2e/test-results/
          retention-days: 7

      - name: Post video link to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## E2E Test Videos 🎬\n\nPlaywright recorded a video for every test in this run.\n\n- 📹 [Download videos](${runUrl}) — expand **playwright-videos** artifact\n- 📊 [Download HTML report](${runUrl}) — expand **playwright-report** artifact\n\n> Videos are \`.webm\` files, playable in Chrome/Firefox or VLC.`,
            })
