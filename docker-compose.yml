services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: gatherly-dynamodb-local
    command: -jar DynamoDBLocal.jar -sharedDb -inMemory
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000 > /dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: gatherly-dynamodb-admin
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
      AWS_REGION: eu-west-2
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    ports:
      - "8001:8001"
    depends_on:
      dynamodb-local:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog:latest
    container_name: gatherly-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: gatherly-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: "3001"
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      DYNAMODB_TABLE_NAME: gatherly-local
      AWS_REGION: eu-west-2
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_SECURE: "false"
      EMAIL_FROM: noreply@gatherlywork.com
      SESSION_SECRET: local-dev-session-secret-change-in-prod
      SQS_QUEUE_URL: ""
    depends_on:
      dynamodb-local:
        condition: service_healthy
      mailhog:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: gatherly-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:3001
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
